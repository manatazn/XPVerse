  <script>
    const tg = window.Telegram.WebApp;
    tg.expand(); 
    tg.ready();

    tg.setHeaderColor('#0a0b1a');
    tg.setBackgroundColor('#050511');

    // BURAYA ÖZ CLOUDFLARE WORKER LINKINI YAPIŞDIR
    const WORKER_URL = "https://xpverse-api.istifadeci-adi.workers.dev"; 

    // İstifadəçi obyekti (Yalnız Serverdən doldurulacaq)
    let userState = null;
    let headerTimeout; 
    const streakRewards = [5, 10, 15, 20, 25, 30, 50];

    // Klaviatura İzləmə Sistemi (Gizlənmə Problemi)
    const bottomNavElement = document.getElementById('bottom-nav');
    let maxViewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;

    function handleKeyboardState() {
      let currentHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      if (currentHeight > maxViewportHeight) maxViewportHeight = currentHeight;
      if (maxViewportHeight - currentHeight > 100) {
        bottomNavElement.classList.add('nav-hidden');
      } else {
        bottomNavElement.classList.remove('nav-hidden');
      }
    }
    if (window.visualViewport) window.visualViewport.addEventListener('resize', handleKeyboardState);
    window.addEventListener('resize', handleKeyboardState);

    // BÜTÜN MƏLUMATLARIN SERVERDƏN ÇƏKİLMƏSİ (No LocalStorage)
    async function loadUserStateFromServer() {
      const tgId = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.id : 123456789;
      const firstName = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.first_name : "User";
      const username = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.username : "xpverse";
      const referrerId = (tg.initDataUnsafe && tg.initDataUnsafe.start_param) ? tg.initDataUnsafe.start_param : null;
      
      try {
        const response = await fetch(`${WORKER_URL}/auth`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tgId, firstName, username, referrerId })
        });
        const data = await response.json();
        
        if (data.success) {
          userState = data.user; // HƏR ŞEY serverdən gəldi
          userState.photoUrl = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.photo_url : "";
          updateUI();
        } else if (data.isBanned) {
          document.body.innerHTML = "<div class='flex items-center justify-center min-h-screen text-red-500 font-black text-xl'>BANNED / BLOKLANDINIZ</div>";
        } else {
          showToast("Xəta", "Server məlumatları oxuya bilmədi.", "error");
        }
      } catch (e) {
        showToast("Bağlantı Xətası", "Serverlə əlaqə qurulmadı.", "error");
      }
    }

    function showToast(title, message, type = 'info') {
      const toast = document.getElementById('toast-container');
      const icon = document.getElementById('toast-icon');
      document.getElementById('toast-title').innerText = title;
      document.getElementById('toast-message').innerText = message;
      
      let iconHtml, iconClass, borderStyle;
      if (type === 'success') {
        iconHtml = '<i class="fa-solid fa-check"></i>';
        iconClass = 'bg-emerald-500/20 text-emerald-400 border-emerald-500/50';
        borderStyle = '1px solid rgba(16, 185, 129, 0.4)';
      } else if (type === 'error') {
        iconHtml = '<i class="fa-solid fa-xmark"></i>';
        iconClass = 'bg-red-500/20 text-red-400 border-red-500/50';
        borderStyle = '1px solid rgba(239, 68, 68, 0.4)';
      } else if (type === 'jackpot') {
        iconHtml = '<i class="fa-solid fa-sack-dollar animate-bounce"></i>';
        iconClass = 'bg-amber-500/20 text-amber-400 border-amber-500/50';
        borderStyle = '1px solid rgba(251, 191, 36, 0.8)';
      } else {
        iconHtml = '<i class="fa-solid fa-bell animate-pulse"></i>';
        iconClass = 'bg-blue-500/20 text-crypto-glow border-crypto-glow/50';
        borderStyle = '1px solid rgba(0, 240, 255, 0.4)';
      }

      icon.innerHTML = iconHtml;
      icon.className = `w-12 h-12 rounded-xl flex shrink-0 items-center justify-center text-xl border ${iconClass}`;
      toast.style.border = borderStyle;
      toast.classList.add('toast-show');
      
      if (tg.HapticFeedback) {
        if (type === 'success' || type === 'jackpot') tg.HapticFeedback.notificationOccurred('success');
        else if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
      }
      setTimeout(() => { toast.classList.remove('toast-show'); }, type === 'jackpot' ? 5000 : 3000); 
    }

    // GÖZƏL ARAYÜZ (UI) YENİLƏNƏSİ
    function updateUI() {
      if (!userState) return;

      document.getElementById('user-name').innerText = userState.firstName;
      document.getElementById('user-xp').innerHTML = `${userState.xp.toLocaleString()} <span class="text-[10px] text-crypto-glow font-bold">XP</span>`;
      document.getElementById('user-usd').innerText = Number(userState.usdBalance).toFixed(2);
      
      if (userState.photoUrl) {
        document.getElementById('user-photo').src = userState.photoUrl;
        document.getElementById('profile-photo-large').src = userState.photoUrl;
      }

      document.getElementById('main-xp-display').innerText = `${userState.xp.toLocaleString()} XP`;
      document.getElementById('ads-watched').innerText = userState.adsWatchedToday;
      document.getElementById('streak-days').innerText = userState.streak || 1;

      document.getElementById('withdraw-balance-display').innerText = Number(userState.usdBalance).toFixed(2);
      renderWithdrawHistory();

      document.getElementById('profile-name').innerText = userState.firstName;
      document.getElementById('profile-tgid').innerText = `ID: ${userState.tgId}`;
      document.getElementById('profile-total-xp').innerText = (userState.totalXp || 0).toLocaleString();
      document.getElementById('profile-boxes').innerText = userState.boxesOpened || 0;
      
      updateProfileProgress();
      renderMissions();
      renderStreakTracker();
    }

    function updateProfileProgress() {
      const xp = userState.totalXp || 0;
      let nextLvlXp = 250, prevLvlXp = 0;
      if (xp >= 20000) { nextLvlXp = 20000; prevLvlXp = 20000; }
      else if (xp >= 3000) { nextLvlXp = 20000; prevLvlXp = 3000; }
      else if (xp >= 1500) { nextLvlXp = 3000; prevLvlXp = 1500; }
      else if (xp >= 750) { nextLvlXp = 1500; prevLvlXp = 750; }
      else if (xp >= 250) { nextLvlXp = 750; prevLvlXp = 250; }

      let progress = nextLvlXp === prevLvlXp ? 100 : ((xp - prevLvlXp) / (nextLvlXp - prevLvlXp)) * 100;
      document.getElementById('profile-xp-progress').style.width = `${progress}%`;
      document.getElementById('profile-current-xp-text').innerText = `${xp.toLocaleString()} XP`;
      document.getElementById('profile-next-xp-text').innerText = (nextLvlXp === 20000 && xp >= 20000) ? 'MAX LVL' : `${nextLvlXp.toLocaleString()} XP`;
      document.getElementById('profile-badge-level').innerText = userState.level;
    }

    function renderStreakTracker() {
      const container = document.getElementById('streak-tracker-container');
      container.innerHTML = '';
      for (let i = 1; i <= 7; i++) {
        const isPast = i < userState.streak || (i === userState.streak && userState.missions.dailyReward.claimed);
        const isToday = i === userState.streak && !userState.missions.dailyReward.claimed;
        const reward = streakRewards[i-1];
        let styles = "bg-[#050511] border-slate-700 text-slate-600";
        let icon = `<span class="text-[9px] font-black">${reward}</span>`;
        let lineStyle = "bg-slate-800";
        
        if (isPast) {
          styles = "bg-emerald-500/20 border-emerald-500/50 text-emerald-400";
          icon = `<i class="fa-solid fa-check text-xs"></i>`;
          lineStyle = "bg-emerald-500/50";
        } else if (isToday) {
          styles = "bg-blue-600/30 border-crypto-glow text-white";
        }

        container.innerHTML += `
          <div class="relative flex flex-col items-center gap-1.5 z-10 flex-1">
            <div class="w-9 h-9 rounded-xl border-2 flex items-center justify-center transition-all duration-300 ${styles} z-10 relative bg-[#0a0b1a]">
              ${icon}
            </div>
            <span class="text-[8px] font-black tracking-widest ${isToday ? 'text-crypto-glow' : 'text-slate-500'}">DAY ${i}</span>
            ${i < 7 ? `<div class="absolute top-4 left-[50%] w-full h-1 -z-0 ${lineStyle} rounded-full"></div>` : ''}
          </div>
        `;
      }
    }

    function renderMissions() {
      const container = document.getElementById('missions-container');
      container.innerHTML = '';
      const missionsList = [
        { key: 'dailyReward', label: `Daily Login`, icon: 'fa-gift', color: 'text-purple-400', bg: 'bg-purple-500/10 border-purple-500/20' },
        { key: 'watch5', label: 'Watch 5 Ads', icon: 'fa-video', color: 'text-blue-400', bg: 'bg-blue-500/10 border-blue-500/20' },
        { key: 'watch10', label: 'Watch 10 Ads', icon: 'fa-film', color: 'text-indigo-400', bg: 'bg-indigo-500/10 border-indigo-500/20' },
        { key: 'watch20', label: 'Watch 20 Ads', icon: 'fa-clapperboard', color: 'text-cyan-400', bg: 'bg-cyan-500/10 border-cyan-500/20' },
        { key: 'all', label: 'All Tasks', icon: 'fa-crown', color: 'text-amber-400', bg: 'bg-amber-500/10 border-amber-500/20' }
      ];

      missionsList.forEach(m => {
        const mission = userState.missions[m.key];
        let isComplete = false, progressText = '';
        
        if (mission.type === 'progress') {
            isComplete = userState.adsWatchedToday >= mission.target;
            progressText = `(${Math.min(userState.adsWatchedToday, mission.target)}/${mission.target})`;
        } else if (mission.type === 'boolean') {
            isComplete = true; // Daily reward auto completes
        } else if (mission.type === 'meta') {
            isComplete = ['dailyReward', 'watch5', 'watch10', 'watch20'].every(k => userState.missions[k].claimed);
        }

        let btnHtml = '';
        if (mission.claimed) {
            btnHtml = `<span class="text-[10px] font-black bg-emerald-500/10 text-emerald-400 px-3 py-1.5 rounded-xl border border-emerald-500/30 flex items-center gap-1"><i class="fa-solid fa-check-double"></i> Claimed</span>`;
        } else if (isComplete) {
            btnHtml = `<button onclick="claimMission('${m.key}')" class="text-[10px] font-black bg-gradient-to-r from-blue-600 to-cyan-500 text-white px-4 py-1.5 rounded-xl shadow-[0_0_15px_rgba(0,240,255,0.4)] active:scale-95 transition-all uppercase tracking-wider">Claim</button>`;
        } else {
            btnHtml = `<span class="text-[10px] font-black bg-slate-800/50 text-slate-200 px-3 py-1.5 rounded-xl border border-slate-600">+${mission.reward} XP</span>`;
        }

        container.innerHTML += `
          <div class="glass-card rounded-2xl p-3 flex justify-between items-center border border-slate-800">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-xl border ${m.bg} flex items-center justify-center">
                 <i class="fa-solid ${m.icon} ${m.color} text-lg"></i>
              </div>
              <div class="flex flex-col">
                <span class="text-xs font-black text-white tracking-wide">${m.label}</span>
                <span class="text-crypto-glow text-[10px] font-bold tracking-widest uppercase opacity-80 mt-0.5">${progressText}</span>
              </div>
            </div>
            ${btnHtml}
          </div>
        `;
      });
    }

    function renderWithdrawHistory() {
      const container = document.getElementById('withdraw-history-container');
      if (!userState.withdrawHistory || userState.withdrawHistory.length === 0) {
        container.innerHTML = `
          <div class="glass-card rounded-2xl p-6 text-center border-dashed border-2 border-slate-700">
            <i class="fa-solid fa-clock-rotate-left text-3xl text-slate-600 mb-2"></i>
            <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">Tarixçə Boşdur</p>
          </div>`;
        return;
      }

      container.innerHTML = '';
      userState.withdrawHistory.forEach(record => {
        container.innerHTML += `
          <div class="glass-card rounded-2xl p-4 flex justify-between items-center border border-slate-800">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center"><i class="fa-solid fa-arrow-right-arrow-left text-slate-400"></i></div>
              <div>
                <p class="text-xs font-black text-white">${record.id} <span class="text-[9px] text-slate-400 ml-1 font-bold">${record.date}</span></p>
                <p class="text-[10px] text-blue-400 mt-0.5 font-mono bg-blue-500/10 inline-block px-1.5 py-0.5 rounded">${record.address}</p>
              </div>
            </div>
            <div class="text-right">
              <p class="text-sm font-black text-emerald-400">-$${Number(record.amount).toFixed(2)}</p>
              <p class="text-[9px] font-black text-amber-400 uppercase tracking-widest mt-0.5 bg-amber-500/10 inline-block px-2 py-0.5 rounded-full border border-amber-500/20">${record.status}</p>
            </div>
          </div>
        `;
      });
    }

    // TƏTBİQ MƏNTİQİ (Serverə Göndərmə)
    async function claimMission(key) {
      try {
        const response = await fetch(`${WORKER_URL}/claimMission`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tgId: userState.tgId, missionKey: key })
        });
        const data = await response.json();
        if (data.success) {
          userState = data.user;
          updateUI();
          showToast("Missiya Tamamlandı!", `Siz mükafat olaraq XP qazandınız!`, "success");
        } else {
          showToast("Xəta", data.error, "error");
        }
      } catch (e) {
        showToast("Xəta", "Serverlə əlaqə qurulmadı.", "error");
      }
    }

    function watchAd() {
      if (userState.adsWatchedToday >= 30) {
        showToast("Limit", "Siz günlük limitə (30 reklam) çatmısınız.", "error");
        return;
      }

      const btn = document.getElementById('watch-ad-btn');
      const originalHTML = btn.innerHTML;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> <span>Loading...</span>';
      btn.classList.add('opacity-80', 'pointer-events-none');

      if (window.Adsgram) {
        const AdController = window.Adsgram.init({ blockId: "int-34999" });
        AdController.show().then(async () => {
          try {
            const response = await fetch(`${WORKER_URL}/watchAd`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ tgId: userState.tgId })
            });
            const data = await response.json();
            if (data.success) {
              userState = data.user;
              updateUI();
              showToast("Mükafat Verildi!", "Reklam təsdiqləndi: +10 XP", "success");
            }
          } catch(e) { showToast("Xəta", "Baza yenilənmədi.", "error"); }
          btn.innerHTML = originalHTML; btn.classList.remove('opacity-80', 'pointer-events-none');
        }).catch(() => {
          btn.innerHTML = originalHTML; btn.classList.remove('opacity-80', 'pointer-events-none');
        });
      } else {
        showToast("Error", "Reklam sistemi aktiv deyil.", "error");
        btn.innerHTML = originalHTML; btn.classList.remove('opacity-80', 'pointer-events-none');
      }
    }

    async function openBox(type) {
      const btn = document.activeElement;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
      btn.classList.add('pointer-events-none');

      try {
        const response = await fetch(`${WORKER_URL}/openBox`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tgId: userState.tgId, boxType: type })
        });
        const data = await response.json();
        if (data.success) {
          userState = data.user;
          updateUI();
          if (data.isJackpot) showToast("🎉 JACKPOT! 🎉", `$${data.reward.toFixed(2)} qazandınız!`, "jackpot");
          else showToast("🎁 Qutu Açıldı!", `$${data.reward.toFixed(2)} çıxdı!`, "success");
        } else showToast("Xəta", data.error, "error");
      } catch (e) { showToast("Xəta", "Server xətası.", "error"); }
      btn.innerHTML = "Open"; btn.classList.remove('pointer-events-none');
    }

    async function requestWithdrawal() {
      const address = document.getElementById('wallet-address').value;
      const amount = parseFloat(document.getElementById('withdraw-amount').value);

      if (!address || address.length < 10) return showToast("Yanlış", "Düzgün TON cüzdanı yazın.", "error");
      if (isNaN(amount) || amount < 5) return showToast("Limit", "Minimum çıxarış $5.00-dır.", "error");
      if (amount > userState.usdBalance) return showToast("Xəta", "Kifayət qədər vəsait yoxdur.", "error");

      const btn = document.getElementById('withdraw-btn');
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Gözləyin...';
      
      try {
        const response = await fetch(`${WORKER_URL}/withdraw`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tgId: userState.tgId, address, amount })
        });
        const data = await response.json();
        if (data.success) {
          userState = data.user;
          updateUI();
          document.getElementById('wallet-address').value = '';
          document.getElementById('withdraw-amount').value = '';
          showToast("Uğurlu", "Çıxarış sorğusu qəbul edildi.", "success");
        } else showToast("Xəta", data.error, "error");
      } catch(e) { showToast("Xəta", "Çıxarış baş tutmadı.", "error"); }
      btn.innerHTML = '<i class="fa-solid fa-money-bill-transfer"></i> Request Withdrawal';
    }

    function switchTab(tabId) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('nav-active'));
      document.getElementById(`view-${tabId}`).classList.remove('hidden');
      document.querySelector(`[data-target="${tabId}"]`).classList.add('nav-active');
      
      const header = document.getElementById('main-header');
      const mainContent = document.getElementById('app-content');
      clearTimeout(headerTimeout);

      if (tabId === 'withdraw' || tabId === 'profile') {
        header.style.transform = 'translateY(-100%)';
        headerTimeout = setTimeout(() => header.style.display = 'none', 300);
        mainContent.classList.remove('pt-24'); mainContent.classList.add('pt-4');
      } else {
        header.style.display = 'block'; 
        setTimeout(() => header.style.transform = 'translateY(0)', 10);
        mainContent.classList.remove('pt-4'); mainContent.classList.add('pt-24');
      }
      if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function updateTimer() {
        const now = new Date();
        const tomorrow = new Date(now);
        tomorrow.setUTCHours(24, 0, 0, 0); 
        const diff = tomorrow.getTime() - now.getTime();
        const h = Math.floor(diff / 1000 / 60 / 60);
        const m = Math.floor((diff / 1000 / 60) % 60);
        const s = Math.floor((diff / 1000) % 60);
        
        const timerEl = document.getElementById('reset-timer');
        if (timerEl) timerEl.innerText = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    async function initApp() {
      await loadUserStateFromServer(); 
      setTimeout(() => {
        document.getElementById('loading-overlay').style.opacity = '0';
        setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; }, 500); 
      }, 1000);

      setInterval(updateTimer, 1000);
      updateTimer();
    }

    initApp();
  </script>
